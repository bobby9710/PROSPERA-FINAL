name: "Prospera Evolution Squad"
description: "Squad de elite para evolução de produtos digitais, focado em UX estratégica, UI Premium (Stitch) e implementação Front-end de alta fidelidade."
performanceMode: "Alta Performance"
companyProfile: "_opensquad/_memory/company.md"

skills:
  - web_search
  - web_fetch

data:
  - pipeline/data/research-brief.md
  - pipeline/data/domain-framework.md
  - pipeline/data/quality-criteria.md
  - pipeline/data/output-examples.md
  - pipeline/data/anti-patterns.md

agents:
  - id: ux_strategist
    name: "Paulo Produto"
    role: "Product Designer & UX Strategist"
    initial: "P"
    prompt: "./agents/ux_strategist.agent.md"
    knowledgeDomains: ["UX Strategy", "Information Architecture", "Conversion Rate Optimization (CRO)"]

  - id: art_director
    name: "Aline Aparência"
    role: "Art Director & UI Specialist"
    initial: "A"
    prompt: "./agents/art_director.agent.md"
    knowledgeDomains: ["Premium UI Design", "Stitch Design System", "Visual Identity"]

  - id: frontend_engineer
    name: "Fabio Front"
    role: "Front-end & Visual Implementation"
    initial: "F"
    prompt: "./agents/frontend_engineer.agent.md"
    knowledgeDomains: ["React/Next.js/Vite", "Micro-interactions", "Responsive Performance"]

  - id: qa_critic
    name: "Vitor Veredito"
    role: "QA & UI/UX Critic"
    initial: "V"
    prompt: "./agents/qa_critic.agent.md"
    knowledgeDomains: ["Quality Assurance", "UX Auditing", "Final Polish & Conversion"]

pipeline:
  stages:
    - name: "Briefing & Estratégia de Produto"
      agent: "ux_strategist"
      task: "Definir a estrutura, fluxos e hierarquia da funcionalidade/página."

    - name: "Direção de Arte & Layout Premium"
      agent: "art_director"
      task: "Criar o design visual seguindo o padrão Stitch e estética premium."

    - name: "Implementação Front-end de Alta Fidelidade"
      agent: "frontend_engineer"
      task: "Transformar o design em código React funcional com animações e micro-interações."

    - name: "Veredito de Qualidade & Polimento"
      agent: "qa_critic"
      task: "Revisar cada detalhe visual e funcional para garantir um produto impecável."
